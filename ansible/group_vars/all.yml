---
# group_vars/all.yml
# Global variables for all playbooks
# Set these as environment variables or in ansible-vault

# HashiCorp Vault
hc_vault_addr:  "{{ lookup('env', 'HC_VAULT_ADDR') }}"
hc_vault_token: "{{ lookup('env', 'HC_VAULT_TOKEN') }}"
hc_vault_mount: "{{ lookup('env', 'HC_VAULT_MOUNT') | default('network') }}"

# Netbox
netbox_token: "{{ lookup('env', 'NETBOX_TOKEN') }}"
netbox_url:   "{{ lookup('env', 'NETBOX_URL') | default('https://netbox.oteualiado.pt') }}"

# Provisioning defaults
provision_defaults:
  ssh_port: 22
  mgmt_interface: Management0
  interface_type: 1000base-t
  ip_prefix: 32
  status: active

# Role colors for Netbox
role_colors:
  router:   aa1409
  switch:   2196f3
  firewall: ff5722
  server:   4caf50
  default:  2196f3
