---
# show_interfaces.yml
# Shows IP interface brief on all routers
#
# Usage:
#   ansible-playbook -i inventory/vault_inventory.py ansible/playbooks/show_interfaces.yml
#   ansible-playbook -i inventory/vault_inventory.py ansible/playbooks/show_interfaces.yml --limit routers

- name: Show IP Interface Brief
  hosts: routers
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Run show ip interface brief
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: output

    - name: Display output
      debug:
        var: output.stdout_lines
