---
# backup_config.yml
# Backs up running configuration from all devices
#
# Usage:
#   ansible-playbook ansible/playbooks/backup_config.yml \
#     -i ansible/inventory/hcvault_inventory.py
#
#   # Backup specific group
#   ansible-playbook ansible/playbooks/backup_config.yml \
#     -i ansible/inventory/hcvault_inventory.py \
#     --limit routers
#
# Output: backups/<hostname>/<hostname>_<date>.cfg

- name: Backup Device Configurations
  hosts: all
  gather_facts: false
  connection: network_cli

  vars:
    backup_dir: "{{ playbook_dir }}/../../backups"
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

  tasks:

    - name: Create backup directory per device
      file:
        path: "{{ backup_dir }}/{{ inventory_hostname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    # -----------------------------------------------------------------------
    # Cisco IOS / IOS XE
    # -----------------------------------------------------------------------

    - name: Backup running config (IOS/IOS XE)
      cisco.ios.ios_config:
        backup: true
        backup_options:
          filename: "{{ inventory_hostname }}_{{ timestamp }}.cfg"
          dir_path: "{{ backup_dir }}/{{ inventory_hostname }}"
      when: ansible_network_os in ['cisco_ios', 'ios']
      register: backup_ios

    # -----------------------------------------------------------------------
    # Cisco IOS XR
    # -----------------------------------------------------------------------

    - name: Get running config (IOS XR)
      cisco.iosxr.iosxr_command:
        commands:
          - show running-config
      register: config_xr
      when: ansible_network_os == 'iosxr'

    - name: Save IOS XR config to file
      copy:
        content: "{{ config_xr.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"
      delegate_to: localhost
      when:
        - ansible_network_os == 'iosxr'
        - config_xr is defined

    # -----------------------------------------------------------------------
    # Arista EOS
    # -----------------------------------------------------------------------

    - name: Get running config (Arista EOS)
      arista.eos.eos_command:
        commands:
          - show running-config
      register: config_eos
      when: ansible_network_os == 'eos'

    - name: Save Arista EOS config to file
      copy:
        content: "{{ config_eos.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"
      delegate_to: localhost
      when:
        - ansible_network_os == 'eos'
        - config_eos is defined

    # -----------------------------------------------------------------------
    # Summary
    # -----------------------------------------------------------------------

    - name: Summary
      debug:
        msg: "✓ {{ inventory_hostname }} — config backed up to backups/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"
