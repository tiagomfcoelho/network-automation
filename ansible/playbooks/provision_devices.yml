---
# provision_devices.yml
# Provisions devices in HashiCorp Vault and Netbox
#
# Usage:
#   export HC_VAULT_ADDR=https://corpvault.oteualiado.pt
#   export HC_VAULT_TOKEN=your_token
#   export NETBOX_TOKEN=your_token
#
#   # Provision all devices
#   ansible-playbook ansible/playbooks/provision_devices.yml \
#     -e @ansible/vars/devices.yml \
#     -e @ansible/vars/secrets.yml \
#     --ask-vault-pass
#
#   # Provision a single device
#   ansible-playbook ansible/playbooks/provision_devices.yml \
#     -e @ansible/vars/devices.yml \
#     -e @ansible/vars/secrets.yml \
#     -e "target_device=xrd-1" \
#     --ask-vault-pass

- name: Provision Devices in HashiCorp Vault and Netbox
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"

  vars:
    target_device: "all"

  tasks:

    # -----------------------------------------------------------------------
    # VALIDATION
    # -----------------------------------------------------------------------

    - name: Validate devices list
      assert:
        that:
          - devices is defined
          - devices | length > 0
        fail_msg: "No devices defined. Pass -e @ansible/vars/devices.yml"

    - name: Validate required fields per device
      assert:
        that:
          - item.name is defined
          - item.ip is defined
          - item.site is defined
          - item.site_slug is defined
          - item.role is defined
          - item.role_slug is defined
          - item.device_type is defined
          - item.manufacturer is defined
          - item.manufacturer_slug is defined
          - item.username is defined
          - item.password is defined
          - item.vault_path is defined
        fail_msg: "Device '{{ item.name | default('unknown') }}' is missing required fields"
      loop: "{{ devices }}"
      when: target_device == 'all' or item.name == target_device

    # -----------------------------------------------------------------------
    # FILTER DEVICES
    # -----------------------------------------------------------------------

    - name: Build filtered device list
      set_fact:
        filtered_devices: >-
          {{ devices if target_device == 'all'
             else devices | selectattr('name', 'equalto', target_device) | list }}

    - name: Fail if no devices match
      fail:
        msg: "No devices found matching target_device='{{ target_device }}'"
      when: filtered_devices | length == 0

    - name: Show devices to provision
      debug:
        msg: "Provisioning {{ filtered_devices | length }} device(s): {{ filtered_devices | map(attribute='name') | list }}"

    # -----------------------------------------------------------------------
    # HASHICORP VAULT — Store credentials
    # -----------------------------------------------------------------------

    - name: Store credentials in HashiCorp Vault
      uri:
        url: "{{ hc_vault_addr }}/v1/{{ hc_vault_mount }}/data/{{ item.vault_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ hc_vault_token }}"
          Content-Type: application/json
        body_format: json
        body:
          data:
            username: "{{ item.username }}"
            password: "{{ item.password }}"
            ip: "{{ item.ip | string }}"
            port: "{{ (item.ssh_port | default(22)) | string }}"
            device_type: "{{ item.device_type }}"
            site: "{{ item.site }}"
        status_code: [200, 204]
      loop: "{{ filtered_devices }}"
      register: vault_results

    - name: HashiCorp Vault provisioning summary
      debug:
        msg: "HashiCorp Vault — {{ item.item.name }}: {{ 'OK' if item.status in [200, 204] else 'FAILED' }}"
      loop: "{{ vault_results.results }}"
      when:
        - vault_results.results is defined
        - not (item.skipped | default(false))

    # -----------------------------------------------------------------------
    # NETBOX — BASE OBJECTS
    # -----------------------------------------------------------------------

    - name: Ensure sites exist
      netbox.netbox.netbox_site:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.site }}"
          slug: "{{ item.site_slug }}"
          status: active
        state: present
      loop: "{{ filtered_devices }}"
      loop_control:
        label: "{{ item.site }}"

    - name: Ensure manufacturers exist
      netbox.netbox.netbox_manufacturer:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.manufacturer }}"
          slug: "{{ item.manufacturer_slug }}"
        state: present
      loop: "{{ filtered_devices }}"
      loop_control:
        label: "{{ item.manufacturer }}"

    - name: Ensure device types exist
      netbox.netbox.netbox_device_type:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          manufacturer:
            slug: "{{ item.manufacturer_slug }}"
          model: "{{ item.device_type }}"
          slug: "{{ item.device_type }}"
        state: present
      loop: "{{ filtered_devices }}"
      loop_control:
        label: "{{ item.device_type }}"

    - name: Ensure device roles exist
      netbox.netbox.netbox_device_role:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.role | capitalize }}"
          slug: "{{ item.role_slug }}"
          color: "{{ role_colors[item.role] | default(role_colors['default']) }}"
        state: present
      loop: "{{ filtered_devices }}"
      loop_control:
        label: "{{ item.role }}"

    # -----------------------------------------------------------------------
    # NETBOX — DEVICES
    # -----------------------------------------------------------------------

    - name: Ensure devices exist
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          device_type:
            slug: "{{ item.device_type }}"
          device_role:
            slug: "{{ item.role_slug }}"
          site:
            name: "{{ item.site }}"
          status: active
        state: present
      loop: "{{ filtered_devices }}"

    - name: Ensure management interfaces exist
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          device:
            name: "{{ item.name }}"
          name: "{{ item.mgmt_interface | default('Management0') }}"
          type: "{{ item.interface_type | default('1000base-t') }}"
          mgmt_only: true
        state: present
      loop: "{{ filtered_devices }}"

    # -----------------------------------------------------------------------
    # NETBOX — IP ADDRESSES
    # -----------------------------------------------------------------------

    - name: Check if IP already exists
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/?address={{ item.ip }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
      loop: "{{ filtered_devices }}"
      register: ip_check

    - name: Create IP if not exists
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          address: "{{ item.item.ip }}/{{ item.item.ip_prefix | default(32) }}"
          status: active
          assigned_object:
            device: "{{ item.item.name }}"
            name: "{{ item.item.mgmt_interface | default('Management0') }}"
        state: present
      loop: "{{ ip_check.results }}"
      when: item.json.count == 0
      loop_control:
        label: "{{ item.item.name }}"

    - name: Set primary IP on device
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.item.name }}"
          primary_ip4: "{{ item.json.results[0].id }}"
        state: present
      loop: "{{ ip_check.results }}"
      when: item.json.count > 0
      loop_control:
        label: "{{ item.item.name }}"

    # -----------------------------------------------------------------------
    # SUMMARY
    # -----------------------------------------------------------------------

    - name: Provisioning complete
      debug:
        msg: "✓ {{ item.name }} provisioned in HashiCorp Vault and Netbox"
      loop: "{{ filtered_devices }}"
