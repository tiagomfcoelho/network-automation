---
# interfaces.yml
# Interface configuration variables per host
#
# Usage:
#   ansible-playbook ansible/playbooks/configure_interfaces.yml \
#     -i ansible/inventory/vault_inventory.py \
#     -e @ansible/vars/interfaces.yml

# Per-host interface configuration
# These vars are automatically picked up by the playbook via host_interfaces

# xrd-1 interfaces
xrd-1_interfaces:
  - name: GigabitEthernet0/0/0/0
    description: "Link to xrd-2"
    enabled: true

xrd-1_l3_interfaces:
  - name: GigabitEthernet0/0/0/0
    ipv4:
      - address: 10.0.0.1/30

# r1 interfaces
r1_interfaces:
  - name: Ethernet0/1
    description: "Link to r2"
    enabled: true

r1_l3_interfaces:
  - name: Ethernet0/1
    ipv4:
      - address: 10.0.0.1/30

# r2 interfaces
r2_interfaces:
  - name: Ethernet0/1
    description: "Link to r1"
    enabled: true

r2_l3_interfaces:
  - name: Ethernet0/1
    ipv4:
      - address: 10.0.0.2/30
