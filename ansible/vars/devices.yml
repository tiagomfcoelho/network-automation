# YAML anchors for common configurations
vaultlab_common: &vaultlab_common
  site: VaultLab
  site_slug: vaultlab
  username: admin
  password: autonetops
  device_type: ceos-lab
  manufacturer: Arista
  manufacturer_slug: arista

devices:
  # DevNetSandboxLab - unique device
  - name: xrd-1
    site: DevNetSandboxLab
    site_slug: devnetsandboxlab
    role: router
    role_slug: router
    device_type: ios-xr
    manufacturer: Cisco
    manufacturer_slug: cisco
    ip: 131.226.217.150
    username: tiagocoelho17
    password: el-54_bI7zIL
    vault_folder: DevNetSandboxLab/Routers
