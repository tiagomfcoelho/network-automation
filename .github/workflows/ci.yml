name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Lint — Python
  # ---------------------------------------------------------------------------
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pynetbox requests

      - name: Lint with flake8
        run: |
          flake8 utils/ netmiko/ napalm/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,E241,E221,E402 \
            --exclude=__pycache__

  # ---------------------------------------------------------------------------
  # Tests — Pytest
  # ---------------------------------------------------------------------------
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-mock requests pynetbox

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Lint — Ansible
  # ---------------------------------------------------------------------------
  lint-ansible:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ansible + lint
        run: |
          pip install ansible ansible-lint pynetbox

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Lint playbooks
        run: |
          ansible-lint ansible/playbooks/ \
            -x yaml[line-length],name[casing],fqcn[action-core],risky-file-permissions,run-once[task],ignore-errors

  # ---------------------------------------------------------------------------
  # Validate — YAML syntax
  # ---------------------------------------------------------------------------
  validate-yaml:
    name: YAML Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          yamllint ansible/ \
            -d "{extends: relaxed, rules: {line-length: {max: 160}, colons: disable, commas: disable}}"
